name: Deploy Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: happyhour-fm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID GitHub secret" >&2
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "Missing CLOUDFLARE_API_TOKEN GitHub secret" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build static site
        run: pnpm build

      - name: Deploy Pages production site
        run: |
          pnpm exec wrangler pages deploy out \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch master
