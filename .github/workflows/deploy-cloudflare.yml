name: Deploy Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: happyhour-fm
      CLOUDFLARE_R2_BUCKET: happyhour-media

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID GitHub secret" >&2
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "Missing CLOUDFLARE_API_TOKEN GitHub secret" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Install Git LFS
        run: git lfs install --local

      - name: Fetch artwork from Git LFS
        run: git lfs pull --include="public/media/*" --exclude="public/media/*.mp3"

      - name: Find changed MP3 files
        id: changed_media
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"

          if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "$before" "${{ github.sha }}" -- 'public/media/*.mp3' | sort > changed-media.txt
            git diff --name-only "$before" "${{ github.sha }}" -- 'data/media-manifest.json' | sort > changed-manifest.txt
          else
            : > changed-media.txt
            : > changed-manifest.txt
          fi

          if [[ -s changed-media.txt ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

          cat changed-media.txt

      - name: Require media manifest update for changed MP3 files
        if: steps.changed_media.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          if [[ ! -s changed-manifest.txt ]]; then
            echo "MP3 files changed without updating data/media-manifest.json." >&2
            echo "Run pnpm generate-media-manifest before committing the episode." >&2
            exit 1
          fi

      - name: Run tests
        run: pnpm test

      - name: Build static site
        run: pnpm build

      - name: Verify exported media assets are real files
        run: |
          set -euo pipefail

          if grep -RIl "version https://git-lfs.github.com/spec/v1" out/media; then
            echo "Static export still contains Git LFS pointer files under out/media." >&2
            exit 1
          fi

      - name: Upload changed MP3s to R2
        if: steps.changed_media.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            [[ -f "$file" ]] || continue

            key="${file#public/}"
            echo "Uploading $file to $key"

            git lfs pull --include="$file" --exclude=""

            wrangler r2 object put "$CLOUDFLARE_R2_BUCKET/$key" \
              --file "$file" \
              --remote \
              --content-type audio/mpeg \
              --cache-control "public, max-age=31536000, immutable"
          done < changed-media.txt

      - name: Deploy Pages production site
        run: |
          wrangler pages deploy out \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch master
